<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 리뷰 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f6f2;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --surface3: #e8e7df;
  --ink: #1a1916;
  --ink2: #6b6a62;
  --ink3: #a8a79f;
  --rule: #e2e1d8;
  --accent: #2d5be3;
  --accent-light: #eef2fd;
  --green: #1c7c4a;
  --green-bg: #eaf5ef;
  --amber: #a05c00;
  --amber-bg: #fff3e0;
  --red: #c0392b;
  --red-bg: #fdecea;
  --tab-h: 52px;
  --header-h: 60px;
  --r: 10px;
  --r-lg: 16px;
  font-size: 14px;
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.6;
}

/* ── TOP HEADER ── */
.top-header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-icon {
  width: 30px; height: 30px;
  background: var(--ink);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 14px; font-weight: 700;
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}
.brand-name {
  font-size: 14px; font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.brand-divider { width: 1px; height: 18px; background: var(--rule); }
.brand-sub { font-size: 12px; color: var(--ink3); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.save-btn {
  font-family: inherit; font-size: 12px; font-weight: 500;
  padding: 6px 16px; border-radius: 20px;
  background: var(--ink); color: #fff; border: none;
  cursor: pointer; transition: opacity .15s;
  display: flex; align-items: center; gap: 6px;
}
.save-btn:hover { opacity: .8; }
.item-count-badge {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--ink3); background: var(--surface2);
  padding: 3px 10px; border-radius: 20px;
}

/* ── TAB BAR ── */
.tab-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  display: flex;
  padding: 0 28px;
  gap: 0;
}
.tab-btn {
  font-family: inherit; font-size: 13px; font-weight: 400;
  padding: 0 20px; height: var(--tab-h);
  background: none; border: none; cursor: pointer;
  color: var(--ink2); position: relative;
  transition: color .15s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 7px;
}
.tab-btn::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--ink); transform: scaleX(0);
  transition: transform .2s;
}
.tab-btn.active { color: var(--ink); font-weight: 500; }
.tab-btn.active::after { transform: scaleX(1); }
.tab-btn:hover { color: var(--ink); }
.tab-icon { font-size: 15px; }

/* ── PAGE WRAPPER ── */
.page { display: none; padding: 28px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }

/* ── SECTION HEADER ── */
.section-hd {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px; flex-wrap: wrap;
}
.section-hd h2 {
  font-size: 16px; font-weight: 700; letter-spacing: -0.02em;
}
.section-hd p { font-size: 12px; color: var(--ink3); margin-left: 4px; }

/* ── MONTH FILTER BAR ── */
.month-bar {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 10px 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.month-bar label { font-size: 12px; color: var(--ink3); font-weight: 500; margin-right: 4px; }
.month-bar select {
  font-family: inherit; font-size: 13px;
  padding: 5px 10px; border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--surface2); color: var(--ink);
  cursor: pointer; outline: none;
}
.month-bar select:focus { border-color: var(--accent); }
.month-clear {
  font-family: inherit; font-size: 12px;
  padding: 5px 12px; border-radius: 8px;
  border: 1px solid var(--rule);
  background: none; color: var(--ink2);
  cursor: pointer;
}
.month-clear:hover { background: var(--surface2); }

/* ── METRIC STRIP ── */
.metrics {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 24px;
}
.metric {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 16px 18px;
}
.metric-label { font-size: 11px; color: var(--ink3); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px; }
.metric-val { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; letter-spacing: -0.03em; color: var(--ink); }
.metric-val.green { color: var(--green); }
.metric-val.amber { color: var(--amber); }
.metric-val.red { color: var(--red); }

/* ── WRITE TAB ── */
.write-card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 28px;
  max-width: 680px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-row { display: flex; flex-direction: column; gap: 5px; }
.form-row.full { grid-column: 1/-1; }
.form-label { font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--ink3); }
.form-input, .form-select, .form-ta {
  font-family: inherit; font-size: 13px;
  padding: 9px 12px; border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg); color: var(--ink);
  outline: none; transition: border-color .15s;
  width: 100%;
}
.form-input:focus, .form-select:focus, .form-ta:focus { border-color: var(--accent); background: #fff; }
.form-ta { resize: vertical; min-height: 80px; line-height: 1.6; }
.form-sep { border: none; border-top: 1px solid var(--rule); margin: 4px 0 14px; }
.submit-row { display: flex; align-items: center; gap: 10px; }
.submit-btn {
  font-family: inherit; font-size: 13px; font-weight: 700;
  padding: 10px 26px; border-radius: 8px;
  background: var(--ink); color: #fff; border: none;
  cursor: pointer; transition: opacity .15s;
}
.submit-btn:hover { opacity: .8; }
.submit-hint { font-size: 12px; color: var(--ink3); }
.toast {
  position: fixed; bottom: 28px; right: 28px;
  background: var(--ink); color: #fff;
  font-size: 13px; padding: 10px 20px;
  border-radius: 8px; z-index: 999;
  opacity: 0; transform: translateY(8px);
  transition: all .25s; pointer-events: none;
}
.toast.show { opacity: 1; transform: none; }

/* ── MONTHLY TAB ── */
.monthly-block {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  margin-bottom: 16px;
  overflow: hidden;
}
.monthly-block-hd {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule);
  background: var(--surface2);
  cursor: pointer; user-select: none;
}
.monthly-block-hd .ym {
  font-size: 14px; font-weight: 700;
  font-family: 'DM Mono', monospace;
  color: var(--ink); letter-spacing: -0.01em;
}
.monthly-block-hd .cnt {
  font-size: 11px; color: var(--ink3);
  background: var(--surface3);
  padding: 2px 9px; border-radius: 20px;
  font-family: 'DM Mono', monospace;
}
.monthly-block-hd .chevron {
  margin-left: auto; color: var(--ink3);
  transition: transform .2s; font-size: 16px;
}
.monthly-block-hd.open .chevron { transform: rotate(180deg); }
.monthly-items { display: none; }
.monthly-items.open { display: block; }
.monthly-group-label {
  font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  color: var(--ink3); padding: 12px 20px 6px;
  border-top: 1px solid var(--rule);
}
.monthly-group-label:first-child { border-top: none; }
.monthly-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 20px; border-top: 1px solid var(--rule);
  transition: background .1s;
}
.monthly-item:hover { background: var(--surface2); }
.monthly-item-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink3); flex-shrink: 0; margin-top: 7px;
}
.monthly-item-body { flex: 1; }
.monthly-item-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
.monthly-item-note { font-size: 12px; color: var(--ink2); }
.monthly-item-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.chip {
  font-size: 11px; padding: 2px 8px; border-radius: 20px;
  font-weight: 400;
}
.chip-ch { background: var(--accent-light); color: var(--accent); }
.chip-ref { background: var(--surface3); color: var(--ink2); }
.monthly-item-status { flex-shrink: 0; }

/* ── STATUS BADGE / SELECT ── */
.sbadge {
  font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap;
}
.sbadge.done { background: var(--green-bg); color: var(--green); }
.sbadge.progress { background: var(--amber-bg); color: var(--amber); }
.sbadge.pending { background: var(--red-bg); color: var(--red); }
.status-sel {
  font-family: inherit; font-size: 11px;
  padding: 3px 7px; border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--surface2); color: var(--ink2);
  cursor: pointer; outline: none;
}

/* ── REFLECT TAB ── */
.reflect-filters {
  display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap;
}
.rf-btn {
  font-family: inherit; font-size: 12px;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--rule);
  background: var(--surface); color: var(--ink2);
  cursor: pointer; transition: all .15s;
}
.rf-btn.on { font-weight: 500; }
.rf-btn.on[data-s="all"]      { background: var(--surface3); color: var(--ink); border-color: var(--surface3); }
.rf-btn.on[data-s="checking"] { background: #e8f0fe; color: #1a56c4; border-color: #c5d5f8; }
.rf-btn.on[data-s="progress"] { background: var(--amber-bg); color: var(--amber); border-color: #f5d9a8; }
.rf-btn.on[data-s="done"]     { background: var(--green-bg); color: var(--green); border-color: #b6e6cb; }
.rf-btn.on[data-s="pending"]  { background: var(--red-bg); color: var(--red); border-color: #f5b8b3; }
.reflect-table {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.rt-head {
  display: grid;
  grid-template-columns: 80px 1fr 120px 100px 110px;
  padding: 10px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--rule);
  font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  color: var(--ink3);
}
.rt-row {
  display: grid;
  grid-template-columns: 80px 1fr 120px 100px 110px;
  padding: 12px 16px;
  border-top: 1px solid var(--rule);
  align-items: center;
  transition: background .1s;
  animation: fadeUp .25s ease both;
}
.rt-row:hover { background: var(--surface2); }
@keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.rt-cell { font-size: 13px; }
.rt-cell.ym { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink2); }
.rt-cell.title { font-weight: 500; padding-right: 12px; }
.rt-cell.note { font-size: 12px; color: var(--ink2); }
.empty-msg {
  text-align: center; padding: 48px 0;
  font-size: 13px; color: var(--ink3);
}
/* status badge colors */
.sbadge.checking { background: #e8f0fe; color: #1a56c4; }
.sbadge.progress { background: var(--amber-bg); color: var(--amber); }
.sbadge.done     { background: var(--green-bg); color: var(--green); }
.sbadge.pending  { background: var(--red-bg); color: var(--red); }
/* status select option colors via class on parent */
.status-sel.s-checking { border-color: #c5d5f8; color: #1a56c4; background: #e8f0fe; }
.status-sel.s-progress { border-color: #f5d9a8; color: var(--amber); background: var(--amber-bg); }
.status-sel.s-done     { border-color: #b6e6cb; color: var(--green); background: var(--green-bg); }
.status-sel.s-pending  { border-color: #f5b8b3; color: var(--red); background: var(--red-bg); }

/* ── SEARCH TAB ── */
.search-hero {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r-lg);
  padding: 20px;
  margin-bottom: 20px;
  display: flex; gap: 10px; align-items: center;
}
.search-hero input {
  flex: 1; font-family: inherit; font-size: 15px;
  padding: 10px 16px; border-radius: 8px;
  border: 1px solid var(--rule);
  background: var(--bg); color: var(--ink);
  outline: none; transition: border-color .15s;
}
.search-hero input:focus { border-color: var(--accent); background: #fff; }
.search-hero input::placeholder { color: var(--ink3); }
.search-hero button {
  font-family: inherit; font-size: 13px; font-weight: 500;
  padding: 10px 20px; border-radius: 8px;
  background: var(--ink); color: #fff; border: none;
  cursor: pointer; transition: opacity .15s; white-space: nowrap;
}
.search-hero button:hover { opacity: .8; }
.search-results { display: flex; flex-direction: column; gap: 8px; }
.search-hit {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 14px 18px;
  display: flex; align-items: flex-start; gap: 14px;
  animation: fadeUp .2s ease both;
}
.search-hit-ym {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--accent); font-weight: 500;
  background: var(--accent-light);
  padding: 3px 10px; border-radius: 6px;
  white-space: nowrap; flex-shrink: 0; margin-top: 1px;
}
.search-hit-body { flex: 1; }
.search-hit-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.search-hit-note { font-size: 12px; color: var(--ink2); }
.search-hit-chips { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
mark { background: #fff0b0; border-radius: 2px; padding: 0 1px; }
.search-empty { text-align: center; padding: 48px 0; font-size: 13px; color: var(--ink3); }

/* ── UTIL ── */
@media (max-width: 700px) {
  .page { padding: 16px; }
  .metrics { grid-template-columns: repeat(2,1fr); }
  .rt-head, .rt-row { grid-template-columns: 70px 1fr 90px; }
  .rt-cell.note, .rt-cell:nth-child(5) { display: none; }
  .tab-btn { padding: 0 12px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- TOP HEADER -->
<header class="top-header">
  <div class="brand">
    <div class="brand-icon">R</div>
    <span class="brand-name">월간 리뷰</span>
    <div class="brand-divider"></div>
    <span class="brand-sub">요청사항 트래커</span>
  </div>
  <div class="header-right">
    <span class="item-count-badge" id="total-badge">0건</span>
  </div>
</header>

<!-- TAB BAR -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="write" onclick="switchTab('write',this)">
    <span class="tab-icon">✏️</span> 리뷰 작성
  </button>
  <button class="tab-btn" data-tab="monthly" onclick="switchTab('monthly',this)">
    <span class="tab-icon">📋</span> 월별 리뷰
  </button>
  <button class="tab-btn" data-tab="reflect" onclick="switchTab('reflect',this)">
    <span class="tab-icon">✅</span> 리뷰 반영
  </button>
  <button class="tab-btn" data-tab="search" onclick="switchTab('search',this)">
    <span class="tab-icon">🔍</span> 리뷰 검색
  </button>
</nav>

<!-- ════════════════════════ TAB 1: 리뷰 작성 ════════════════════════ -->
<section class="page active" id="tab-write">
  <div class="section-hd">
    <h2>리뷰 작성</h2>
    <p>회의록을 붙여넣으면 줄 단위로 항목이 자동 분리되어 저장됩니다</p>
  </div>

  <div class="write-card">
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">연도</label>
        <select class="form-select" id="w-year"></select>
      </div>
      <div class="form-row">
        <label class="form-label">월</label>
        <select class="form-select" id="w-month">
          <option value="01">1월</option><option value="02">2월</option>
          <option value="03">3월</option><option value="04">4월</option>
          <option value="05">5월</option><option value="06">6월</option>
          <option value="07">7월</option><option value="08">8월</option>
          <option value="09">9월</option><option value="10">10월</option>
          <option value="11">11월</option><option value="12">12월</option>
        </select>
      </div>
      <div class="form-row full">
        <label class="form-label">회의록 내용 <span style="color:var(--red)">*</span></label>
        <textarea class="form-ta" id="w-bulk" style="min-height:180px" placeholder="회의록 내용을 그대로 붙여넣으세요. 줄마다 항목 하나로 자동 분리됩니다.

예시)
토스페이 소재 변경 제안
구글 매체 타겟 끄기
메타 소재 테스트 진행"></textarea>
      </div>
    </div>

    <!-- 미리보기 영역 -->
    <div id="preview-area" style="display:none; margin-top:14px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px;">미리보기 — 아래 항목들이 저장됩니다</div>
      <div id="preview-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;"></div>
    </div>

    <hr class="form-sep">
    <div class="submit-row">
      <button class="submit-btn" onclick="previewItems()">미리보기</button>
      <button class="submit-btn" id="confirm-btn" style="display:none;background:var(--green)" onclick="confirmSave()">저장 확정</button>
      <span class="submit-hint" id="submit-hint">미리보기 후 저장 확정하면 모든 탭에 반영됩니다</span>
    </div>
  </div>
</section>

<!-- ════════════════════════ TAB 2: 월별 리뷰 ════════════════════════ -->
<section class="page" id="tab-monthly">
  <div class="section-hd">
    <h2>월별 리뷰</h2>
    <p>월별 전체 회의록을 확인합니다</p>
  </div>
  <div class="month-bar">
    <label>연도</label>
    <select id="m-year" onchange="renderMonthly()"></select>
    <label>월</label>
    <select id="m-month" onchange="renderMonthly()">
      <option value="">전체</option>
      <option value="01">1월</option><option value="02">2월</option>
      <option value="03">3월</option><option value="04">4월</option>
      <option value="05">5월</option><option value="06">6월</option>
      <option value="07">7월</option><option value="08">8월</option>
      <option value="09">9월</option><option value="10">10월</option>
      <option value="11">11월</option><option value="12">12월</option>
    </select>
    <button class="month-clear" onclick="clearMonthFilter('m')">전체 보기</button>
  </div>
  <div id="monthly-content"></div>
</section>

<!-- ════════════════════════ TAB 3: 리뷰 반영 ════════════════════════ -->
<section class="page" id="tab-reflect">
  <div class="section-hd">
    <h2>리뷰 반영</h2>
    <p>요청사항의 진행 상태를 관리합니다</p>
  </div>
  <div class="month-bar">
    <label>연도</label>
    <select id="r-year" onchange="renderReflect()"></select>
    <label>월</label>
    <select id="r-month" onchange="renderReflect()">
      <option value="">전체</option>
      <option value="01">1월</option><option value="02">2월</option>
      <option value="03">3월</option><option value="04">4월</option>

<script>
// ════ DATA STORE ════
let ITEMS = JSON.parse(localStorage.getItem('review_items') || '[]');
let nextId = parseInt(localStorage.getItem('review_next_id') || '1');
let reflectStatusFilter = 'all';

// ── sample data (4월) seeded once
if (ITEMS.length === 0) {

    {group:'제안사항',channel:'구글',title:'상시 소재 추가 투입 제안',note:'집행 대기 중인 특가존/건기식/헤어케어 등 상시 소재 구글 추가 투입',status:'pending',ref:''},
    {group:'제안사항',channel:'메타',title:'MF3554 신규 소재 투입',note:'메타 MF3554 신규 소재 투입 제안',status:'pending',ref:''},
    {group:'제안사항',channel:'메타/카카오',title:'써봐야안다 신규 소재 테스트',note:'메타 슬라이드 형식 / 비즈보드 카피 변경 테스트 제안',status:'pending',ref:'4탭 260행'},
    {group:'제안사항',channel:'카카오',title:'KPF 타겟팅 테스트',note:'① 모먼트 발송: 멤플회원/비회원 분리  ② 채널 발송: 친구 아닌 여성 3054 기준',status:'pending',ref:''},
    {group:'제안사항',channel:'메타',title:'메타 크리에이티브 다양성 확대',note:'AI 머신러닝 중복 인지 방지 — 첫구매/아모레위크/멤버십위크 등 고정 기획전 우선 운영',status:'pending',ref:''},
    {group:'제안사항',channel:'인스타그램',title:'인스타그램 라이브 광고 활용',note:'인스타그램 라이브 광고 활용 제안',status:'pending',ref:'6탭 63행'},
    {group:'와이즈버즈',channel:'구글',title:'써봐야안다 소재 ACe 제외 확인',note:'신규 소재는 소원님 업데이트 예정 — ACe 써봐야안다 OFF 확인 완료',status:'done',ref:''},
    {group:'와이즈버즈',channel:'카카오',title:'아세페 기간 KPF 퀴즈형 고려',note:'채널 발송 인구통계정보 타겟팅 검토',status:'pending',ref:''},
    {group:'와이즈버즈',channel:'유튜브',title:'유튜브 & 디멘드젠 성과 전체 비교',note:'이전 유튜브 캠페인 및 디멘드젠 조회 성과 전체 비교 — 명일 정리 후 전달 예정',status:'progress',ref:''},
    {group:'와이즈버즈',channel:'카카오',title:'디멘드젠 캠페인 조회수 기준 정리',note:'지수 대리님 전달 완료',status:'done',ref:''},
    {group:'와이즈버즈',channel:'구글/메타',title:'설화수 윤조에센스 캠페인 진행',note:'22일 2천만원 집행 / 매주 + 최종 리포팅 전달 / 유사타겟팅 확장',status:'progress',ref:''},
    {group:'와이즈버즈',channel:'전체',title:'KPI 기반 성과 보고 체계 논의',note:'앱/구매/가입/트래픽 KPI별 보고 방향 논의 예정',status:'progress',ref:''},
    {group:'아모레몰',channel:'구글',title:'구글 머천트 센터 계정 초대 요청',note:'아모레몰 → 와이즈버즈에 계정 초대 요청',status:'pending',ref:''},
    {group:'아모레몰',channel:'인스타그램',title:'인스타그램 라방 진행 가능성 확인',note:'진행 가능 여부 확인 필요',status:'pending',ref:''},
    {group:'추가요청',channel:'유튜브',title:'인스타/유튜브 라이브 동시 송출 확인',note:'동시 송출 가능 여부 및 레퍼 확인 요청',status:'pending',ref:''},
    {group:'추가요청',channel:'유튜브',title:'유튜브 리타겟팅 광고 상품 확인',note:'유튜브 광고 리타겟팅 가능한 상품 확인 요청',status:'pending',ref:''},
    {group:'추가요청',channel:'전체',title:'레지 캠페인 관련 논의',note:'레지 캠페인 관련 별도 논의 필요',status:'pending',ref:''},
    {group:'추가요청',channel:'카카오',title:'카카오모먼트 카탈로그형 BETA 확인',note:'달바에서 발송 받은 카카오모먼트 카탈로그형 BETA 서비스 확인 요청',status:'pending',ref:''},
  ];
  seed.forEach(s => {
    ITEMS.push({ id: nextId++, ym: '2026-04', ...s });

function persist() {
  localStorage.setItem('review_items', JSON.stringify(ITEMS));
  localStorage.setItem('review_next_id', String(nextId));
}

// ════ YEAR SELECTS ════
function getYears() {
  const cur = new Date().getFullYear();
  return [cur-1, cur, cur+1];
}
function populateYearSelects() {
  const years = getYears();
  const cur = String(new Date().getFullYear());
  ['w-year','m-year','r-year'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = years.map(y => `<option value="${y}" ${String(y)===cur?'selected':''}>${y}년</option>`).join('');
  });
  // set w-month to current month
  const cm = String(new Date().getMonth()+1).padStart(2,'0');
  const wm = document.getElementById('w-month');
  if (wm) wm.value = cm;
}

// ════ TAB SWITCHING ════
function switchTab(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
  if (id === 'monthly') renderMonthly();
  if (id === 'reflect') renderReflect();
}

// ════ WRITE ════
let pendingItems = [];

function previewItems() {
  const raw = document.getElementById('w-bulk').value;
  const y = document.getElementById('w-year').value;
  const m = document.getElementById('w-month').value;

  // 줄 단위 분리, 빈 줄·기호 제거
  const lines = raw.split('\n')
    .map(l => l.replace(/^[-•*#\s]+/, '').trim())
    .filter(l => l.length > 0);

  if (!lines.length) { showToast('내용을 입력해주세요'); return; }

  pendingItems = lines.map((title, i) => ({
    id: null,
    ym: `${y}-${m}`,
    group: '기타',
    channel: '',
    title,
    note: '',
    ref: '',
    status: 'checking',
  }));

  const previewArea = document.getElementById('preview-area');
  previewArea.style.display = 'block';
  renderPreviewList();

  document.getElementById('confirm-btn').style.display = 'inline-block';
  document.getElementById('submit-hint').textContent = `${lines.length}개 항목 확인 후 저장 확정하세요`;
}

function renderPreviewList() {
  document.getElementById('preview-list').innerHTML = pendingItems.map((item, i) => `
    <div style="background:var(--bg);border:1px solid var(--rule);border-radius:10px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;">
      <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);flex-shrink:0;padding-top:9px">${String(i+1).padStart(2,'0')}</span>
      <div style="flex:1;display:flex;flex-direction:column;gap:7px;">
        <input class="form-input" style="background:#fff;font-weight:500;" placeholder="제목" value="${item.title.replace(/"/g,'&quot;')}"
          oninput="pendingItems[${i}].title=this.value" />
        <textarea class="form-ta" style="background:#fff;min-height:56px;font-size:12px;" placeholder="상세 내용 메모 (선택)"
          oninput="pendingItems[${i}].note=this.value">${item.note||''}</textarea>
      </div>
      <button onclick="removePending(${i})" style="font-size:20px;color:var(--ink3);background:none;border:none;cursor:pointer;flex-shrink:0;line-height:1;padding-top:6px">×</button>
    </div>`).join('');
}

function removePending(i) {
  pendingItems.splice(i, 1);
  if (pendingItems.length === 0) {
    document.getElementById('preview-area').style.display = 'none';
    document.getElementById('confirm-btn').style.display = 'none';
    document.getElementById('submit-hint').textContent = '미리보기 후 저장 확정하면 모든 탭에 반영됩니다';
    return;
  }
  renderPreviewList();
  document.getElementById('submit-hint').textContent = `${pendingItems.length}개 항목 확인 후 저장 확정하세요`;
}

function confirmSave() {
  if (!pendingItems.length) return;
  pendingItems.forEach(item => {
    ITEMS.push({ ...item, id: nextId++ });
  });
  persist();
  updateBadge();
  const cnt = pendingItems.length;
  pendingItems = [];
  document.getElementById('w-bulk').value = '';
  document.getElementById('preview-area').style.display = 'none';
  document.getElementById('confirm-btn').style.display = 'none';
  document.getElementById('submit-hint').textContent = '미리보기 후 저장 확정하면 모든 탭에 반영됩니다';
  showToast(`${cnt}개 항목이 저장되었습니다 ✓`);
}

// ════ MONTHLY ════
function getMonthlyFilter() {
  const y = document.getElementById('m-year').value;
  const m = document.getElementById('m-month').value;
  return { y, m };
}
function renderMonthly() {
  const { y, m } = getMonthlyFilter();

  let yms = [...new Set(ITEMS.map(x=>x.ym))].sort().reverse();
  if (m) yms = yms.filter(ym => ym === `${y}-${m}`);
  else if (y) yms = yms.filter(ym => ym.startsWith(y));

  const el = document.getElementById('monthly-content');
  if (!yms.length) { el.innerHTML = '<div class="empty-msg">해당 기간의 리뷰 항목이 없습니다</div>'; return; }

  el.innerHTML = yms.map(ym => {
    const [yr, mo] = ym.split('-');
    const ymItems = ITEMS.filter(x=>x.ym===ym);
    const itemsHtml = ymItems.map(item => `
      <div class="monthly-item" id="mitem-${item.id}">
        <div class="monthly-item-dot"></div>
        <div class="monthly-item-body">
          <div class="monthly-item-title">${item.title}</div>
          ${item.note ? `<div class="monthly-item-note">${item.note}</div>` : ''}
        </div>
        <div class="monthly-item-status" style="display:flex;align-items:center;gap:8px">
          <span class="sbadge ${item.status}">${statusLabel(item.status)}</span>
          <button onclick="deleteItem(${item.id})" title="항목 삭제"
            style="font-size:15px;color:var(--ink3);background:none;border:none;cursor:pointer;line-height:1;padding:2px 4px;border-radius:4px;transition:color .15s"
            onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--ink3)'">×</button>
        </div>
      </div>`).join('');

    return `<div class="monthly-block">
      <div class="monthly-block-hd open" onclick="toggleBlock(this)">
        <span class="ym">${yr}년 ${parseInt(mo)}월</span>
        <span class="cnt">${ymItems.length}건</span>
        <button onclick="deleteMonth(event,'${ym}')"
          style="margin-left:auto;margin-right:8px;font-size:11px;font-family:inherit;font-weight:500;padding:3px 10px;border-radius:20px;border:1px solid var(--rule);background:var(--surface);color:var(--red);cursor:pointer;transition:all .15s"
          onmouseover="this.style.background='var(--red-bg)'" onmouseout="this.style.background='var(--surface)'">
          🗑 월 전체 삭제
        </button>
        <span class="chevron">▾</span>
      </div>
      <div class="monthly-items open">${itemsHtml}</div>
    </div>`;
  }).join('');
}

function deleteItem(id) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  const idx = ITEMS.findIndex(x => x.id === id);
  if (idx !== -1) {
    ITEMS.splice(idx, 1);
    persist();
    updateBadge();
    renderMonthly();
    renderReflect();
  }
}

function deleteMonth(e, ym) {
  e.stopPropagation(); // 블록 접기 방지
  const [yr, mo] = ym.split('-');
  if (!confirm(`${yr}년 ${parseInt(mo)}월 항목 전체를 삭제할까요?`)) return;
  const before = ITEMS.length;
  ITEMS.splice(0, ITEMS.length, ...ITEMS.filter(x => x.ym !== ym));
  persist();
  updateBadge();
  renderMonthly();
  renderReflect();
  showToast(`${before - ITEMS.length}개 항목이 삭제되었습니다`);
}
function toggleBlock(hd) {
  hd.classList.toggle('open');
  hd.nextElementSibling.classList.toggle('open');
}

// ════ REFLECT ════
function renderReflect() {
  const y = document.getElementById('r-year').value;
  const m = document.getElementById('r-month').value;

  let data = ITEMS;
  if (m) data = data.filter(x => x.ym === `${y}-${m}`);
  else if (y) data = data.filter(x => x.ym.startsWith(y));
  if (reflectStatusFilter !== 'all') data = data.filter(x => x.status === reflectStatusFilter);

  const all = m ? ITEMS.filter(x=>x.ym===`${y}-${m}`) : ITEMS.filter(x=>x.ym.startsWith(y));
  const done     = all.filter(x=>x.status==='done').length;
  const prog     = all.filter(x=>x.status==='progress').length;
  const checking = all.filter(x=>x.status==='checking').length;
  const pending  = all.filter(x=>x.status==='pending').length;

  document.getElementById('reflect-metrics').innerHTML = [
    { l:'전체',    v: all.length+'건', cls:'' },
    { l:'완료',    v: done+'건',       cls:'green' },
    { l:'진행 중', v: prog+'건',       cls:'amber' },
    { l:'확인 중', v: checking+'건',   cls:'amber' },
    { l:'미진행',  v: pending+'건',    cls:'red' },
  ].map(m => `<div class="metric"><div class="metric-label">${m.l}</div><div class="metric-val ${m.cls}">${m.v}</div></div>`).join('');

  // 5칸 메트릭
  document.getElementById('reflect-metrics').style.gridTemplateColumns = 'repeat(5,1fr)';

  const rows = document.getElementById('reflect-rows');
  if (!data.length) { rows.innerHTML = '<div class="empty-msg">해당 조건의 항목이 없습니다</div>'; return; }

  rows.innerHTML = data.map(item => {
    const [yr,mo] = item.ym.split('-');
    const sClass = { checking:'checking', progress:'progress', done:'done', pending:'pending' }[item.status] || 'pending';
    return `<div class="rt-row" style="grid-template-columns:80px 1fr 1fr 130px;align-items:start;padding:14px 16px;">
      <div class="rt-cell ym" style="padding-top:4px">${yr}.${mo}</div>
      <div class="rt-cell title">${item.title}</div>
      <div class="rt-cell note" style="font-size:12px;color:var(--ink2);line-height:1.55;white-space:pre-wrap;padding-right:12px">${item.note || '—'}</div>
      <div class="rt-cell">
        <select class="status-sel s-${sClass}" onchange="changeStatus(${item.id},this.value)">
          <option value="checking" ${item.status==='checking'?'selected':''}>확인 중</option>
          <option value="progress" ${item.status==='progress'?'selected':''}>진행 중</option>
          <option value="done"     ${item.status==='done'    ?'selected':''}>완료</option>
          <option value="pending"  ${item.status==='pending' ?'selected':''}>미진행</option>
        </select>
      </div>
    </div>`;
  }).join('');
}
function setReflectFilter(s, btn) {
  reflectStatusFilter = s;
  document.querySelectorAll('.rf-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderReflect();
}
function changeStatus(id, val) {
  const item = ITEMS.find(x=>x.id===id);
  if (item) { item.status = val; persist(); renderReflect(); updateBadge(); }
}

// ════ SEARCH ════
function doSearch() {
  const q = document.getElementById('search-q').value.trim();
  const el = document.getElementById('search-results');
  if (!q) { el.innerHTML = '<div class="search-empty">검색어를 입력해주세요</div>'; return; }
  const ql = q.toLowerCase();
  const hits = ITEMS.filter(x =>
    x.title.toLowerCase().includes(ql) ||
    x.note.toLowerCase().includes(ql) ||
    x.channel.toLowerCase().includes(ql) ||
    x.group.toLowerCase().includes(ql)
  );
  if (!hits.length) { el.innerHTML = `<div class="search-empty">"${q}"에 대한 검색 결과가 없습니다</div>`; return; }

  function hl(str) {
    if (!str) return '';
    return str.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
  }
  el.innerHTML = hits.map(item => {
    const [yr,mo] = item.ym.split('-');
    return `<div class="search-hit">
      <span class="search-hit-ym">${yr}년 ${parseInt(mo)}월</span>
      <div class="search-hit-body">
        <div class="search-hit-title">${hl(item.title)}</div>
        ${item.note ? `<div class="search-hit-note">${hl(item.note)}</div>` : ''}
        <div class="search-hit-chips">
          ${item.channel ? `<span class="chip chip-ch">${item.channel}</span>` : ''}
          <span class="chip chip-ref">${item.group}</span>
          <span class="sbadge ${item.status}" style="font-size:11px">${statusLabel(item.status)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ════ HELPERS ════
function statusLabel(s) { return { done:'완료', progress:'진행 중', checking:'확인 중', pending:'미진행' }[s] || s; }

function clearMonthFilter(prefix) {
  document.getElementById(prefix+'-month').value = '';
  if (prefix === 'm') renderMonthly();
  if (prefix === 'r') renderReflect();
}

function updateBadge() {
  document.getElementById('total-badge').textContent = ITEMS.length + '건';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function saveFile() {
  const serialized = JSON.stringify(ITEMS, null, 2);
  const scripts = document.querySelectorAll('script');
  const lastScript = scripts[scripts.length-1];
  const updated = lastScript.textContent.replace(
    /let ITEMS = JSON\.parse\(localStorage\.getItem\('review_items'\) \|\| '\[\]'\);/,
    `let ITEMS = ${serialized};`
  ).replace(
    /let nextId = parseInt\(localStorage\.getItem\('review_next_id'\) \|\| '1'\);/,
    `let nextId = ${nextId};`
  ).replace(
    /if \(ITEMS\.length === 0\) \{[\s\S]*?persist\(\);\s*\}/,
    ''
  );
  const fullHtml = '<!DOCTYPE html>\n' + document.documentElement.outerHTML.replace(lastScript.textContent, updated);
  const blob = new Blob([fullHtml], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '월간리뷰_대시보드.html';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('파일이 다운로드되었습니다 💾');
}

// ════ INIT ════
populateYearSelects();
updateBadge();
renderMonthly();
renderReflect();
</script>
